name: Refresh preseason alpha

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10,22 * 7,8,9 *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/refresh-alpha.mjs
      - name: Commit changed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/preseason-alpha.json
          git diff --cached --quiet || git commit -m "Refresh preseason alpha"
          git push
